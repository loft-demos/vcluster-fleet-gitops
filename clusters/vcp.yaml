# vcp.yaml - the vCluster Platform management cluster, as a fleet member.
#
# The Platform management cluster is registered as a Cluster too (commonly
# "loft-cluster"), so it is a valid ArgoCDApplication destination and gets the
# control-plane baseline plus management-cluster-only components.
#
# Carve-out: management-cluster-critical components (the Envoy Gateway that
# exposes Argo CD and the platform, and the cert-manager their TLS depends on)
# are seeded by the same IaC step that installs Argo CD. The bindings for this
# cluster then ADOPT and self-heal those existing releases. Do not expect Argo CD
# to install from zero the very components it needs to reach this cluster.
apiVersion: management.loft.sh/v1
kind: Cluster
metadata:
  # Confirm the actual name of your management cluster
  # (kubectl get clusters.management.loft.sh); it is often "loft-cluster".
  name: loft-cluster
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    fleet.lab.kurtmadel.com/metallb-pool: "192.168.50.0/24"
    fleet.lab.kurtmadel.com/gateway-lb-ip: "192.168.50.10"
    fleet.lab.kurtmadel.com/base-domain: "lab.kurtmadel.com"
    fleet.lab.kurtmadel.com/cluster-issuer: "letsencrypt-prod"
    # Management cluster only: adds the vcp-tls passthrough listener.
    fleet.lab.kurtmadel.com/platform-hostname: "vcp.lab.kurtmadel.com"
    fleet.lab.kurtmadel.com/profiles: "vcp-management-cluster-baseline"
  labels:
    fleet.lab.kurtmadel.com/baseline: "true"
spec:
  displayName: "vCP Management Cluster"
