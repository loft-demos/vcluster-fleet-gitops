apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcluster-gitops-watcher
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-gitops-watcher-vci-read
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kargo.akuity.io"]
    resources: ["promotions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-gitops-watcher-vci-read
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-gitops-watcher-vci-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-gitops-watcher-vci-status-patch
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-gitops-watcher-vci-status-patch
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-gitops-watcher-vci-status-patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcluster-gitops-watcher-argocd-write
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcluster-gitops-watcher-argocd-write
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vcluster-gitops-watcher-argocd-write
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcluster-gitops-watcher
  namespace: argocd
  labels:
    app.kubernetes.io/name: vcluster-gitops-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcluster-gitops-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcluster-gitops-watcher
    spec:
      serviceAccountName: vcluster-gitops-watcher
      nodeSelector:
        argocd: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: watcher
          image: ghcr.io/loft-demos/vcluster-gitops-watcher:1.2.0-rc.1
          imagePullPolicy: IfNotPresent
          env:
            - name: ARGOCD_NAMESPACE
              value: argocd
            - name: ARGOCD_APPLICATION_NAMESPACE
              value: argocd
            - name: ARGOCD_CLUSTER_SECRET_NAMESPACE
              value: argocd
            - name: ARGOCD_CLUSTER_SECRET_NAME_TEMPLATES
              value: loft-{project}-virtualcluster-{virtualcluster},loft-{project}-vcluster-{virtualcluster}
            - name: WATCH_POLL_INTERVAL
              value: 2s
            - name: WATCH_PROJECT_NAMESPACE_PREFIXES
              value: p-,loft-p-
            - name: WATCH_PATCH_APPLICATION_HEALTH
              value: "true"
            - name: WATCH_WAKE_UPSTREAM_BASE
              value: https://vcp.lab.kurtmadel.com
            - name: WATCH_WAKE_TOKEN_PATH
              value: /var/run/secrets/vcluster-platform/token
            - name: WATCH_WAKE_TIMEOUT
              value: 10s
            - name: WATCH_WAKE_RETRY_INTERVAL
              value: 30s
            - name: WATCH_WAKE_SUCCESS_ON
              value: 502,504
            - name: WATCH_UPDATE_VCI_LAST_ACTIVITY_ON_WAKE
              value: "true"
          volumeMounts:
            - name: vcluster-platform-token
              mountPath: /var/run/secrets/vcluster-platform
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: vcluster-platform-token
          secret:
            secretName: vcluster-platform-token
            items:
              - key: token
                path: token
