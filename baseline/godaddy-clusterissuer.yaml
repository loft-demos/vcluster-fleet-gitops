# godaddy-clusterissuer.yaml - per-cluster Let's Encrypt production issuer.
#
# The issuer uses the GoDaddy DNS-01 webhook and the out-of-band
# cert-manager/godaddy-api-key Secret. Its name and DNS zone come from the
# target Cluster's fleet annotations.
apiVersion: management.loft.sh/v1
kind: ArgoCDApplicationTemplate
metadata:
  name: godaddy-clusterissuer
spec:
  displayName: "Let's Encrypt GoDaddy ClusterIssuer"
  owner:
    team: loft-admins
  template:
    spec:
      project: default
      source:
        repoURL: https://forgejo.apps.lab.kurtmadel.com/vcluster-demos/platform-config.git
        targetRevision: main
        path: baseline/charts/godaddy-clusterissuer
        helm:
          releaseName: godaddy-clusterissuer
          # Rendered by vCluster Platform per target Cluster.
          values: |
            issuerName: '{{ index .Values.loft.clusterAnnotations "fleet.lab.kurtmadel.com/cluster-issuer" }}'
            dnsZone: '{{ index .Values.loft.clusterAnnotations "fleet.lab.kurtmadel.com/base-domain" }}'
      destination:
        namespace: cert-manager
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
  parameters: []
