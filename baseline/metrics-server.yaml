# metrics-server.yaml - uniform baseline app.
#
# metrics-server is identical on every control plane cluster, so this is a single
# uniform template (no clusterAnnotations). The --kubelet-insecure-tls arg is the
# common homelab/kubeadm requirement where kubelet serving certs are not signed
# by the cluster CA; drop it on clusters with properly signed kubelet certs.
apiVersion: management.loft.sh/v1
kind: ArgoCDApplicationTemplate
metadata:
  name: metrics-server
spec:
  displayName: "metrics-server"
  owner:
    team: loft-admins
  template:
    spec:
      project: default
      source:
        repoURL: https://kubernetes-sigs.github.io/metrics-server/
        chart: metrics-server
        targetRevision: 3.12.2
        helm:
          releaseName: metrics-server
          values: |
            args:
              - --kubelet-insecure-tls
      destination:
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
  parameters: []
