apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fleetprofiles.fleet.lab.kurtmadel.com
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  group: fleet.lab.kurtmadel.com
  scope: Namespaced
  names:
    plural: fleetprofiles
    singular: fleetprofile
    kind: FleetProfile
    listKind: FleetProfileList
    categories:
      - fleet
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - applications
              properties:
                applications:
                  type: array
                  minItems: 1
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - name
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 253
                        pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
                        description: >-
                          Name of the ArgoCDApplicationTemplate to bind.
                      dependsOn:
                        type: array
                        default: []
                        x-kubernetes-list-type: set
                        items:
                          type: string
                          minLength: 1
                          maxLength: 253
                          pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
                        description: >-
                          Application template names that must be Healthy and
                          Synced before this binding is created.
                  description: >-
                    Argo CD application templates assigned by this profile.
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
