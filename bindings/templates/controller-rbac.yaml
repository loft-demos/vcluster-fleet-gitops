{{- if .Values.controller.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-binding-controller
  namespace: {{ .Values.controller.namespace }}
  labels:
    {{- include "fleet-bindings.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fleet-binding-controller-cluster-read
  labels:
    {{- include "fleet-bindings.labels" . | nindent 4 }}
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances"]
    verbs: ["get", "list", "watch", "use"]
  - apiGroups: ["management.loft.sh"]
    resources: ["argocdapplications"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # AccessKeys contain bearer credentials. This controller needs these verbs
  # only for its labelled per-VCI writer and short-lived installer keys.
  - apiGroups: ["storage.loft.sh"]
    resources: ["accesskeys"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fleet-binding-controller-cluster-read
  labels:
    {{- include "fleet-bindings.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fleet-binding-controller
    namespace: {{ .Values.controller.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fleet-binding-controller-cluster-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fleet-binding-controller-argocdapplications
  namespace: {{ .Values.projectNamespace }}
  labels:
    {{- include "fleet-bindings.labels" . | nindent 4 }}
rules:
  - apiGroups: ["fleet.lab.kurtmadel.com"]
    resources: ["fleetprofiles"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fleet-binding-controller-argocdapplications
  namespace: {{ .Values.projectNamespace }}
  labels:
    {{- include "fleet-bindings.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fleet-binding-controller
    namespace: {{ .Values.controller.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fleet-binding-controller-argocdapplications
{{- end }}
