{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-binding-controller
  namespace: {{ .Values.controller.namespace }}
  labels:
    {{- include "fleet-bindings.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "fleet-bindings.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fleet-bindings.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/controller-configmap.yaml") . | sha256sum }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: fleet-binding-controller
      # The controller reads its bearer token straight off the projected
      # service account volume (no client-go), so this must stay true.
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: controller
          {{- $imageTag := .Values.controller.image.tag | default .Chart.AppVersion }}
          image: "{{ .Values.controller.image.repository }}:{{ $imageTag }}{{ with .Values.controller.image.digest }}@{{ . }}{{ end }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          env:
            - name: PROJECT_NAMESPACE
              value: {{ .Values.projectNamespace | quote }}
            - name: FLEET_BINDING_CLUSTER_SELECTOR_PATH
              value: /config/cluster-selector.json
            - name: FLEET_BINDING_DEFAULT_PROFILES
              value: {{ join "," .Values.controller.defaultProfiles | quote }}
            - name: FLEET_BINDING_PROFILE_ANNOTATION
              value: {{ .Values.controller.profileAnnotation | quote }}
            - name: FLEET_BINDING_EXTRA_APPS_ANNOTATION
              value: {{ .Values.controller.extraAppsAnnotation | quote }}
            - name: FLEET_BINDING_SKIP_APPS_ANNOTATION
              value: {{ .Values.controller.skipAppsAnnotation | quote }}
            - name: FLEET_BINDING_VCI_OBSERVABILITY_ENABLED
              value: {{ .Values.controller.virtualClusters.observabilityEnabled | quote }}
            - name: FLEET_BINDING_VCI_PRIVATE_NODES_PROFILE
              value: {{ .Values.controller.virtualClusters.privateNodesProfile | quote }}
            - name: FLEET_BINDING_VCI_SHARED_NODES_PROFILE
              value: {{ .Values.controller.virtualClusters.sharedNodesProfile | quote }}
            - name: FLEET_BINDING_VCI_DISABLED_ANNOTATION
              value: {{ .Values.controller.virtualClusters.disabledAnnotation | quote }}
            - name: FLEET_BINDING_VCI_PROFILE_OVERRIDE_ANNOTATION
              value: {{ .Values.controller.virtualClusters.profileOverrideAnnotation | quote }}
            - name: FLEET_BINDING_WRITER_CREDENTIALS_ENABLED
              value: {{ .Values.controller.writerCredentials.enabled | quote }}
            - name: FLEET_BINDING_PLATFORM_URL
              value: {{ .Values.controller.writerCredentials.platformURL | quote }}
            - name: FLEET_BINDING_PLATFORM_INSECURE_SKIP_VERIFY
              value: {{ .Values.controller.writerCredentials.insecureSkipVerify | quote }}
            - name: FLEET_BINDING_WRITER_SECRET_NAMESPACE
              value: {{ .Values.controller.writerCredentials.secretNamespace | quote }}
            - name: FLEET_BINDING_WRITER_SECRET_NAME
              value: {{ .Values.controller.writerCredentials.secretName | quote }}
            - name: FLEET_BINDING_WRITER_SYNC_INTERVAL
              value: {{ .Values.controller.writerCredentials.syncInterval | quote }}
            - name: FLEET_BINDING_INSTALLER_USER
              value: {{ .Values.controller.writerCredentials.installerUser | quote }}
            {{- if .Values.controller.writerCredentials.platformCASecretName }}
            - name: FLEET_BINDING_PLATFORM_CA_PATH
              value: /platform-ca/ca.crt
            {{- end }}
            - name: RECONCILE_INTERVAL
              value: {{ .Values.controller.reconcileInterval | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.controller.logLevel | quote }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.controller.writerCredentials.platformCASecretName }}
            - name: platform-ca
              mountPath: /platform-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: fleet-binding-controller-config
        {{- if .Values.controller.writerCredentials.platformCASecretName }}
        - name: platform-ca
          secret:
            secretName: {{ .Values.controller.writerCredentials.platformCASecretName }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
