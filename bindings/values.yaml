# Central policy namespace: FleetProfiles and Cluster-targeted applications live
# here. VCI-targeted applications live in each VCI's own project namespace.
projectNamespace: p-platform

# Named app sets. A selected Cluster chooses one or more profiles with:
#
#   fleet.lab.kurtmadel.com/profiles: control-plane-baseline,gpu-nvidia-baseline
#
# These values render namespaced FleetProfile resources. Application names are
# ArgoCDApplicationTemplate references. Per-cluster values still live on the
# Cluster's fleet.lab.kurtmadel.com/* annotations and are consumed by the
# ArgoCDApplicationTemplates. dependsOn gates initial creation until every
# prerequisite is both Healthy and Synced.
profiles:
  # Automatically selected for rendered VirtualClusterInstances with
  # privateNodes.enabled: true.
  tenant-observability-private-nodes:
    applications:
      - name: cluster-collector

  # Automatically selected for rendered VirtualClusterInstances without
  # private nodes. The referenced template is maintained by the environment
  # and deliberately omits host-level collectors.
  tenant-observability-shared-nodes:
    applications:
      - name: shared-node-tenant-collector

  control-plane-baseline:
    applications:
      - name: cert-manager
      - name: godaddy-webhook
        dependsOn:
          - cert-manager
      - name: godaddy-clusterissuer
        dependsOn:
          - godaddy-webhook
      - name: metrics-server
      - name: metallb
      - name: metallb-config
        dependsOn:
          - metallb
      - name: envoy-gateway
      - name: cert-config
        dependsOn:
          - godaddy-clusterissuer
      - name: envoy-gateway-config
        dependsOn:
          - envoy-gateway
          - metallb-config
          - cert-config
      - name: external-dns
        dependsOn:
          - envoy-gateway-config

  # Platform management cluster profile. It gets the control-plane baseline plus
  # the watcher that patches Argo CD application health and wakes sleeping vClusters.
  vcp-management-cluster-baseline:
    applications:
      - name: cert-manager
      - name: godaddy-webhook
        dependsOn:
          - cert-manager
      - name: godaddy-clusterissuer
        dependsOn:
          - godaddy-webhook
      - name: metrics-server
      - name: metallb
      - name: metallb-config
        dependsOn:
          - metallb
      - name: envoy-gateway
      - name: cert-config
        dependsOn:
          - godaddy-clusterissuer
      - name: envoy-gateway-config
        dependsOn:
          - envoy-gateway
          - metallb-config
          - cert-config
      - name: external-dns
        dependsOn:
          - envoy-gateway-config
      - name: vcluster-gitops-watcher

  # Reserved GPU profiles. Add the matching ArgoCDApplicationTemplates before
  # assigning these profiles to a Cluster.
  gpu-nvidia-baseline:
    applications:
      - name: nvidia-gpu-operator
      - name: nvidia-dra-driver-gpu

  gpu-amd-baseline:
    applications:
      - name: amd-gpu-operator
      - name: amd-dra-driver

controller:
  enabled: true
  namespace: vcluster-platform
  # The controller has no leader election: it just polls and reconciles
  # idempotently. A value above 1 does not parallelize anything, it just adds
  # redundant API calls against the vCP cluster every reconcile interval.
  replicaCount: 1

  image:
    repository: ghcr.io/loft-demos/vcluster-fleet-gitops/fleet-binding-controller
    # Empty uses Chart.yaml appVersion. Set this only to test or pin a
    # controller version independently from the chart release.
    tag: ""
    # Optional digest (sha256:...) to pin the image beyond the tag. Takes
    # precedence over the tag when set: image is "repository:tag@digest".
    digest: ""
    pullPolicy: IfNotPresent

  reconcileInterval: 30s
  logLevel: INFO

  clusterSelector:
    matchLabels:
      fleet.lab.kurtmadel.com/baseline: "true"

  # Used when a selected Cluster does not set fleet.lab.kurtmadel.com/profiles.
  defaultProfiles:
    - control-plane-baseline

  profileAnnotation: fleet.lab.kurtmadel.com/profiles
  extraAppsAnnotation: fleet.lab.kurtmadel.com/extra-apps
  skipAppsAnnotation: fleet.lab.kurtmadel.com/skip-apps

  virtualClusters:
    # Enroll every rendered VCI by default. Set the disabled annotation below
    # to "true" on an individual instance to opt it out.
    observabilityEnabled: true
    privateNodesProfile: tenant-observability-private-nodes
    sharedNodesProfile: tenant-observability-shared-nodes
    disabledAnnotation: fleet.lab.kurtmadel.com/observability-disabled
    profileOverrideAnnotation: fleet.lab.kurtmadel.com/observability-profile

  writerCredentials:
    # Creates one exact-scope metrics-writer AccessKey per VCI and reconciles
    # it into the tenant Secret without exposing the token in an Application.
    enabled: true
    platformURL: https://vcp.lab.kurtmadel.com
    insecureSkipVerify: false
    # Optional Secret in controller.namespace containing ca.crt.
    platformCASecretName: ""
    secretNamespace: observability
    secretName: otel-otlp-auth
    # Recheck and self-heal the tenant Secret at this interval. A controller
    # restart performs an immediate check regardless of this value.
    syncInterval: 10m
    # Used only by a five-minute, VCI-scoped installer key that is deleted
    # immediately after the tenant Secret API operation.
    installerUser: admin

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Emergency/manual escape hatch. Leave disabled for normal operation; dynamic
# bindings should come from Cluster metadata and the controller above.
staticBindings:
  enabled: false
  clusters: []
