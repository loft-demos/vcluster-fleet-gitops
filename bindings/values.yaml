# The vCluster Platform project namespace the ArgoCDApplication objects live in.
projectNamespace: p-platform

# Named app sets. A selected Cluster chooses one or more profiles with:
#
#   fleet.lab.kurtmadel.com/profiles: control-plane-baseline,gpu-nvidia-baseline
#
# These values render namespaced FleetProfile resources. Application names are
# ArgoCDApplicationTemplate references. Per-cluster values still live on the
# Cluster's fleet.lab.kurtmadel.com/* annotations and are consumed by the
# ArgoCDApplicationTemplates. dependsOn gates initial creation until every
# prerequisite is both Healthy and Synced.
profiles:
  control-plane-baseline:
    applications:
      - name: cert-manager
      - name: godaddy-webhook
        dependsOn:
          - cert-manager
      - name: godaddy-clusterissuer
        dependsOn:
          - godaddy-webhook
      - name: metrics-server
      - name: metallb
      - name: metallb-config
        dependsOn:
          - metallb
      - name: envoy-gateway
      - name: cert-config
        dependsOn:
          - godaddy-clusterissuer
      - name: envoy-gateway-config
        dependsOn:
          - envoy-gateway
          - metallb-config
          - cert-config
      - name: external-dns
        dependsOn:
          - envoy-gateway-config

  # Platform management cluster profile. It gets the control-plane baseline plus
  # the watcher that patches Argo CD application health and wakes sleeping vClusters.
  vcp-management-cluster-baseline:
    applications:
      - name: cert-manager
      - name: godaddy-webhook
        dependsOn:
          - cert-manager
      - name: godaddy-clusterissuer
        dependsOn:
          - godaddy-webhook
      - name: metrics-server
      - name: metallb
      - name: metallb-config
        dependsOn:
          - metallb
      - name: envoy-gateway
      - name: cert-config
        dependsOn:
          - godaddy-clusterissuer
      - name: envoy-gateway-config
        dependsOn:
          - envoy-gateway
          - metallb-config
          - cert-config
      - name: external-dns
        dependsOn:
          - envoy-gateway-config
      - name: vcluster-gitops-watcher

  # Central Fleet Observability stack for the vCluster Platform management
  # cluster. Required per-binding parameters stay on the destination Cluster
  # using the controller's <template>.argocd-template-param... convention.
  fleet-observability-platform:
    applications:
      - name: fleet-observability-prometheus
      - name: fleet-observability-grafana
        dependsOn:
          - fleet-observability-prometheus
      - name: cluster-collector
        dependsOn:
          - fleet-observability-prometheus

  # Reserved GPU profiles. Add the matching ArgoCDApplicationTemplates before
  # assigning these profiles to a Cluster.
  gpu-nvidia-baseline:
    applications:
      - name: nvidia-gpu-operator
      - name: nvidia-dra-driver-gpu

  gpu-amd-baseline:
    applications:
      - name: amd-gpu-operator
      - name: amd-dra-driver

controller:
  enabled: true
  namespace: vcluster-platform
  # The controller has no leader election: it just polls and reconciles
  # idempotently. A value above 1 does not parallelize anything, it just adds
  # redundant API calls against the vCP cluster every reconcile interval.
  replicaCount: 1

  image:
    repository: ghcr.io/loft-demos/vcluster-fleet-gitops/fleet-binding-controller
    tag: "0.1.0"
    # Optional digest (sha256:...) to pin the image beyond the tag. Takes
    # precedence over the tag when set: image is "repository:tag@digest".
    digest: ""
    pullPolicy: IfNotPresent

  reconcileInterval: 30s
  logLevel: INFO

  clusterSelector:
    matchLabels:
      fleet.lab.kurtmadel.com/baseline: "true"

  # Used when a selected Cluster does not set fleet.lab.kurtmadel.com/profiles.
  defaultProfiles:
    - control-plane-baseline

  profileAnnotation: fleet.lab.kurtmadel.com/profiles
  extraAppsAnnotation: fleet.lab.kurtmadel.com/extra-apps
  skipAppsAnnotation: fleet.lab.kurtmadel.com/skip-apps

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Emergency/manual escape hatch. Leave disabled for normal operation; dynamic
# bindings should come from Cluster metadata and the controller above.
staticBindings:
  enabled: false
  clusters: []
