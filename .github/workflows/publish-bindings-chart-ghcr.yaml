name: Publish Bindings Chart to GHCR

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  OCI_REPOSITORY: loft-demos/vcluster-fleet-gitops
  CHART_PATH: bindings
  CHART_NAME: fleet-bindings

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Validate chart version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          release_version="${RELEASE_TAG#v}"
          chart_version="$(helm show chart "${CHART_PATH}" | sed -n 's/^version: //p')"

          if [ "${chart_version}" != "${release_version}" ]; then
            echo "::error file=${CHART_PATH}/Chart.yaml::Chart version ${chart_version} does not match release ${RELEASE_TAG}"
            exit 1
          fi

      - name: Lint chart
        run: helm lint "${CHART_PATH}"

      - name: Log in to the Container registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "${GHCR_TOKEN}" |
            helm registry login "${REGISTRY}" \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

      - name: Package and push chart
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          release_version="${RELEASE_TAG#v}"
          package_directory="${RUNNER_TEMP}/helm-packages"
          mkdir -p "${package_directory}"

          helm package "${CHART_PATH}" --destination "${package_directory}"
          helm push \
            "${package_directory}/${CHART_NAME}-${release_version}.tgz" \
            "oci://${REGISTRY}/${OCI_REPOSITORY}"
